<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- 文字化けを完全に防ぐための設定 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココロ・ショート - 想いを伝える動画撮影ガイド</title>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (ブラウザ上でReactを動かすため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* シニアでも見やすいフォントと優しい配色 */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            background-color: #fdf8f5; /* 温かみのある背景色 */
            color: #333333;
        }
        .btn-primary { 
            background-color: #f08a5d; /* 優しいオレンジ */
            color: white; 
            transition: all 0.2s; 
        }
        .btn-primary:active { 
            transform: scale(0.98); 
            background-color: #e07a4d; 
        }
        /* 選択肢ボタン */
        .btn-select {
            background-color: white;
            border: 2px solid #f08a5d;
            color: #f08a5d;
            transition: all 0.2s;
        }
        .btn-select:active {
            background-color: #f08a5d;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [industry, setIndustry] = useState('');
            const [theme, setTheme] = useState('');
            const [duration, setDuration] = useState('');
            
            const [loading, setLoading] = useState(false);
            const [guideData, setGuideData] = useState(null);
            const [currentCut, setCurrentCut] = useState(0);

            // 選択肢のデータ
            const industries = ["🍽️ 飲食業", "⚙️ 製造業", "🏗️ 工事業", "💆‍♀️ サービス業", "💼 士業", "✂️ サロン", "📦 その他"];
            const themes = ["🏢 会社紹介", "🤝 求人募集", "🔨 仕事風景", "🗣️ 社長の想い", "🏃 1日密着", "🏠 店舗紹介", "👀 お客様目線"];
            const durations = ["⏱️ 15秒", "⏱️ 30秒", "⏱️ 60秒"];

            // APIを叩いて撮影ガイドを生成する関数
            const generateGuide = async (selectedDuration) => {
                setDuration(selectedDuration);
                setLoading(true);
                setStep(4); // ガイド画面へ移行
                
                const apiKey = ""; // プレビュー環境では自動注入されます
                
                const prompt = `あなたは動画初心者の経営者を支援するAIです。
以下の条件で、CapCut自動カット機能を使ったショート動画用の撮影ガイドをJSONで作成してください。
業種: ${industry}
テーマ: ${theme}
動画尺: ${selectedDuration}

・1カットあたり5〜7秒程度で構成する
・専門用語を使わず、なぜその撮影をするのか感情的に説明する
・空気感、人の温度感を重視する
・JSONフォーマットで出力すること。`;

                const systemPrompt = `You are an expert video director for beginners. Respond with JSON only. No markdown formatting.
Schema:
{
  "cuts": [
    { "step": number, "instruction": "string", "purpose": "string", "duration": number, "technique": "string", "tips": "string", "ng": "string" }
  ],
  "sns": { "text": "string", "hashtags": ["string"], "bgm": "string", "title": "string" }
}`;

                // 通信エラー時用のフォールバック（モックデータ）
                const mockData = {
                    cuts: [
                        { step: 1, instruction: "外観や看板を5秒撮影してください", purpose: "どこにあるどんな場所かを見ている人に伝えるため", duration: 5, technique: "固定撮影（じっと止める）", tips: "スマホを両手でしっかり持ち、深呼吸して止めましょう。", ng: "歩きながら撮るとブレて見にくくなります。" },
                        { step: 2, instruction: "働く人の笑顔や作業風景を撮影", purpose: "安心感と温かさを伝えるため", duration: 6, technique: "寄り撮影（少し近づく）", tips: "少し近づいて、表情や手元がよく見えるように撮ります。", ng: "遠くから小さく撮ると雰囲気が伝わりません。" },
                        { step: 3, instruction: "こだわりのポイントを撮影", purpose: "あなたの会社の魅力を伝えるため", duration: 5, technique: "パン撮影（ゆっくり横へ）", tips: "息を止めて、3秒かけてゆっくりと横にスライドさせます。", ng: "速く動かしすぎると見ている人が酔ってしまいます。" },
                        { step: 4, instruction: "完成した状態や、全体の風景", purpose: "動画の最後に余韻を残すため", duration: 5, technique: "固定撮影", tips: "そのままじっと5秒数えます。", ng: "縦横に画面を揺らさないでください。" }
                    ],
                    sns: {
                        text: "私たちの想いがつまった日常風景です。少しでも雰囲気が伝われば嬉しいです！ぜひお気軽にお問い合わせください😊",
                        hashtags: ["#日常風景", "#想いを伝える", "#初心者動画"],
                        bgm: "温かみのあるアコースティックギター",
                        title: "私たちの日常と想い"
                    }
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API Error");
                    
                    const data = await response.json();
                    const generatedText = data.candidates[0].content.parts[0].text;
                    setGuideData(JSON.parse(generatedText));
                } catch (err) {
                    console.warn("API request failed or parsing error, using mock data.", err);
                    // エラー時は安全なモックデータを使用
                    setGuideData(mockData);
                } finally {
                    setLoading(false);
                }
            };

            // コピー機能（iframe等での制限を考慮した方法）
            const handleCopy = () => {
                const textToCopy = `【${guideData.sns.title}】\n\n${guideData.sns.text}\n\n${guideData.sns.hashtags.join(" ")}`;
                
                // document.execCommand('copy') を使用 (iframe制約回避用)
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert("クリップボードにコピーしました！");
                } catch (err) {
                    alert("コピーに失敗しました。手動でコピーしてください。");
                }
                document.body.removeChild(textArea);
            };

            // 画面コンポーネント: トップ
            const renderTop = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-sm w-full max-w-sm">
                        <h1 className="text-3xl font-black text-gray-800 mb-2">ココロ・ショート</h1>
                        <p className="text-orange-500 font-bold mb-8">〜 想いを伝える動画ガイド 〜</p>
                        <p className="text-gray-600 mb-8 font-medium leading-relaxed">
                            動画編集の知識は不要です。<br/>
                            AIの指示通りに5秒ずつ<br/>スマホで撮影するだけ！
                        </p>
                        <button onClick={() => setStep(1)} className="btn-primary w-full text-xl py-4 rounded-2xl shadow-lg font-bold">
                            さっそく始める
                        </button>
                    </div>
                </div>
            );

            // 画面コンポーネント: 選択画面共通
            const renderSelection = (title, options, onSelect) => (
                <div className="max-w-md mx-auto p-4 flex flex-col min-h-[90vh]">
                    <div className="mb-8 mt-4 text-center">
                        <p className="text-sm text-orange-500 font-bold mb-2">STEP {step} / 3</p>
                        <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
                    </div>
                    <div className="grid grid-cols-1 gap-3 flex-grow">
                        {options.map((opt, i) => (
                            <button 
                                key={i} 
                                onClick={() => onSelect(opt)}
                                className="btn-select w-full text-lg py-4 rounded-xl font-bold shadow-sm"
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    <button onClick={() => setStep(step - 1)} className="mt-6 text-gray-500 font-bold py-4">
                        戻る
                    </button>
                </div>
            );

            // 画面コンポーネント: 撮影ガイド
            const renderGuide = () => {
                if (loading || !guideData) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-[90vh] p-4 text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-orange-500 mb-6 mx-auto"></div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">台本を作成中...</h2>
                            <p className="text-gray-600">あなた専用の撮影ガイドを考えています</p>
                        </div>
                    );
                }

                const cut = guideData.cuts[currentCut];
                const isLast = currentCut === guideData.cuts.length - 1;

                return (
                    <div className="max-w-md mx-auto p-4 flex flex-col min-h-screen">
                        <div className="mb-4 mt-2">
                            <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                <span className="text-orange-500 font-bold">撮影ガイド</span>
                                <span className="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-bold">
                                    カット {currentCut + 1} / {guideData.cuts.length}
                                </span>
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-3xl shadow-sm p-6 mb-6 flex-grow border-t-4 border-orange-400">
                            <h2 className="text-2xl font-black text-gray-800 mb-6 leading-tight">{cut.instruction}</h2>
                            
                            <div className="bg-orange-50 p-4 mb-6 rounded-2xl">
                                <p className="text-sm text-orange-800 font-bold mb-1 flex items-center">
                                    <span className="text-xl mr-1">❤️</span> なぜ撮るの？
                                </p>
                                <p className="text-gray-800 font-medium">{cut.purpose}</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮影時間</p>
                                    <p className="text-xl font-black text-gray-800">約 {cut.duration} 秒</p>
                                </div>
                                <div className="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮り方</p>
                                    <p className="text-md font-black text-gray-800">{cut.technique}</p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                                    <p className="text-sm font-bold text-green-700 mb-1">✅ 初心者向けコツ</p>
                                    <p className="text-gray-700 text-sm">{cut.tips}</p>
                                </div>
                                <div className="bg-red-50/50 p-4 rounded-2xl border border-red-100">
                                    <p className="text-sm font-bold text-red-600 mb-1">⚠️ 失敗しやすい例</p>
                                    <p className="text-gray-700 text-sm">{cut.ng}</p>
                                </div>
                            </div>
                        </div>

                        <button 
                            onClick={() => isLast ? setStep(5) : setCurrentCut(c => c + 1)}
                            className="btn-primary w-full text-xl py-5 rounded-2xl shadow-lg font-bold mt-auto mb-4"
                        >
                            {isLast ? "すべての撮影を完了する！" : "撮影できた！（次へ）"}
                        </button>
                    </div>
                );
            };

            // 画面コンポーネント: 完了画面
            const renderComplete = () => (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-12">
                    <div className="text-center mb-8 mt-6">
                        <h2 className="text-3xl font-black text-gray-800 mb-2">🎉 お疲れ様でした！</h2>
                        <p className="text-gray-600 font-medium">これで動画の素材は完璧です。</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-6">
                        <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                            <span className="mr-2">✂️</span> CapCutで仕上げる
                        </h3>
                        <ol className="list-decimal list-inside text-gray-700 space-y-3 font-medium">
                            <li>スマホで <strong>CapCut</strong> を開く</li>
                            <li><strong>「自動カット」</strong> をタップ</li>
                            <li>今撮った動画を <strong>古い順に</strong> 選ぶ</li>
                            <li>あとはAIにおまかせ！</li>
                        </ol>
                        <div className="mt-5 p-4 bg-orange-50 rounded-2xl text-sm text-gray-700 border border-orange-100">
                            💡 おすすめのBGMの雰囲気：<br/><strong className="text-orange-600 text-base">{guideData.sns.bgm}</strong>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-8">
                        <h3 className="text-xl font-bold text-gray-800 mb-2 flex items-center">
                            <span className="mr-2">📝</span> SNS投稿テキスト
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">コピーしてそのまま貼り付けられます。</p>
                        
                        <div className="bg-gray-50 p-4 rounded-2xl text-gray-700 whitespace-pre-wrap mb-4 font-sans text-sm border border-gray-100">
                            【{guideData.sns.title}】{"\n\n"}
                            {guideData.sns.text}{"\n\n"}
                            {guideData.sns.hashtags.join(" ")}
                        </div>
                        
                        <button 
                            onClick={handleCopy}
                            className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold transition-colors hover:bg-gray-700"
                        >
                            テキストをコピーする
                        </button>
                    </div>
                    
                    <button 
                        onClick={() => { setStep(0); setCurrentCut(0); setGuideData(null); }}
                        className="w-full text-orange-600 py-4 font-bold"
                    >
                        最初からやり直す
                    </button>
                </div>
            );

            // ルーティング
            return (
                <div className="font-sans antialiased">
                    {step === 0 && renderTop()}
                    {step === 1 && renderSelection("あなたの業種は？", industries, (val) => { setIndustry(val); setStep(2); })}
                    {step === 2 && renderSelection("動画のテーマは？", themes, (val) => { setTheme(val); setStep(3); })}
                    {step === 3 && renderSelection("動画の長さは？", durations, (val) => generateGuide(val))}
                    {step === 4 && renderGuide()}
                    {step === 5 && renderComplete()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
